# Install cloudflared as a system service separately.
# Keep the browser's raw surface camera URL outside this fallback ingress.
# This bridge only exposes metadata WebSocket and bounded fallback/debug MJPEG.
tunnel: replace-with-tunnel-id
credentials-file: /etc/cloudflared/replace-with-tunnel-id.json

ingress:
  - hostname: camera.example.com
    path: ^/ws/vision/.*$
    service: http://127.0.0.1:8080
  - hostname: camera.example.com
    path: ^/stream\.mjpg$
    service: http://127.0.0.1:8080
  - service: http_status:404
